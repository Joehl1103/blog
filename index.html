<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Text Area</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #ffffff;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(100%, 720px);
      }

      label {
        display: block;
        margin-bottom: 12px;
        font-size: 1rem;
        font-weight: 600;
        color: #111111;
      }

      textarea {
        width: 100%;
        min-height: 280px;
        padding: 16px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        resize: vertical;
        font: inherit;
        color: #111111;
        background: #ffffff;
      }

      textarea:focus {
        outline: 2px solid #111111;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="text-input">Text Area</label>
      <textarea
        id="text-input"
        name="text-input"
        placeholder="Type here..."
      ></textarea>
    </main>
  </body>
</html>
